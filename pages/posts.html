<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아무 말 대잔치 - 게시글 목록</title>
    <link rel="stylesheet" href="../styles/main.css">
    <script type="module" src="../src/pages/posts.js"></script>
  </head>
  <body>
    <header class="site-header posts-header">
      <h1>아무 말 대잔치</h1>
      <div class="header-profile">
        <button class="header-avatar" type="button" aria-label="프로필 메뉴 열기" aria-expanded="false">
          <img class="header-avatar-image" alt="내 프로필 사진" hidden>
          <span class="header-avatar-fallback" aria-hidden="true"></span>
        </button>
        <nav class="profile-menu" aria-label="프로필 메뉴" hidden>
          <a href="profile-edit.html">회원정보수정</a>
          <a href="password-edit.html">비밀번호수정</a>
          <button class="logout-button" type="button">로그아웃</button>
        </nav>
      </div>
    </header>

    <main class="posts-page">
      <section class="posts-section" aria-labelledby="posts-title">
        <h2 id="posts-title" class="posts-title">
          안녕하세요,<br>
          아무 말 대잔치 <strong>게시판</strong> 입니다.
        </h2>

        <div class="posts-actions">
          <a class="write-link" href="post-create.html">게시글 작성</a>
        </div>

        <p class="posts-state" aria-live="polite" hidden></p>
        <div class="posts-list" aria-live="polite"></div>
        <div class="posts-sentinel" aria-hidden="true"></div>
      </section>
    </main>
  </body>
</html>
