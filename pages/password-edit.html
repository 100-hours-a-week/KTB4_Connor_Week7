<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아무 말 대잔치 - 비밀번호 수정</title>
    <link rel="stylesheet" href="../styles/main.css">
    <script type="module" src="../src/pages/password-edit.js"></script>
  </head>
  <body>
    <header class="site-header">
      <a class="back-link" href="posts.html" aria-label="이전 페이지로 이동">‹</a>
      <h1>아무 말 대잔치</h1>
      <div class="header-profile">
        <button class="header-avatar" type="button" aria-label="프로필 메뉴 열기" aria-expanded="false">
          <img class="header-avatar-image" alt="내 프로필 사진" hidden>
          <span class="header-avatar-fallback" aria-hidden="true"></span>
        </button>
        <nav class="profile-menu" aria-label="프로필 메뉴" hidden>
          <a href="profile-edit.html">회원정보수정</a>
          <a href="password-edit.html">비밀번호수정</a>
          <button class="logout-button" type="button">로그아웃</button>
        </nav>
      </div>
    </header>

    <main class="password-edit-page">
      <section class="password-edit-section" aria-labelledby="password-edit-title">
        <h2 id="password-edit-title">비밀번호 수정</h2>

        <form class="password-edit-form" novalidate>
          <div class="field">
            <label for="new-password">비밀번호</label>
            <input
              id="new-password"
              name="newPassword"
              type="password"
              autocomplete="new-password"
              placeholder="비밀번호를 입력하세요"
              aria-describedby="new-password-helper form-helper"
            >
            <p id="new-password-helper" class="helper-text" aria-live="polite"></p>
          </div>

          <div class="field">
            <label for="password-confirm">비밀번호 확인</label>
            <input
              id="password-confirm"
              name="passwordConfirm"
              type="password"
              autocomplete="new-password"
              placeholder="비밀번호를 한번 더 입력하세요"
              aria-describedby="password-confirm-helper form-helper"
            >
            <p id="password-confirm-helper" class="helper-text" aria-live="polite"></p>
          </div>

          <p id="form-helper" class="helper-text form-helper" aria-live="polite"></p>
          <button class="password-submit" type="submit" disabled>수정하기</button>
        </form>

        <p class="toast" role="status" hidden>수정완료</p>
      </section>
    </main>
  </body>
</html>
